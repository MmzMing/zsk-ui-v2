<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karot Chat Component</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
        }

        .message-wrapper {
            display: flex;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .message-wrapper.user {
            justify-content: flex-end;
            flex-direction: row;
        }

        .message-wrapper.bot {
            justify-content: flex-start;
            flex-direction: row;
        }

        .avatar {
            width: 44px;
            height: 44px;
            flex-shrink: 0;
            margin-top: 4px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .avatar.show {
            opacity: 1;
            transform: scale(1);
        }

        .avatar.user {
            margin-left: 12px;
            position: relative;
        }

        .avatar.user::before {
            content: '';
            position: absolute;
            width: 44px;
            height: 44px;
            background: #fff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .avatar.user::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #0a0a0a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .avatar.bot {
            margin-right: 12px;
            position: relative;
        }

        .avatar.bot::before {
            content: '';
            position: absolute;
            width: 36px;
            height: 36px;
            background: #fff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            top: 0;
            left: 4px;
        }

        .avatar.bot::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 20px;
            background: #333;
            border-radius: 50% 50% 40% 40%;
            top: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .bubble {
            max-width: 480px;
            min-width: 280px;
            min-height: 60px;
            padding: 18px 24px;
            font-size: 16px;
            line-height: 1.6;
            position: relative;
            word-wrap: break-word;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transform-origin: var(--origin-x) 50%;
            transform: scaleX(0.1) scaleY(0.3);
            transition: all 0.5s cubic-bezier(0.34, 1.8, 0.64, 1);
        }

        .bubble.show {
            opacity: 1;
            transform: scaleX(1) scaleY(1);
        }

        .bubble.user {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            border-radius: 16px 4px 16px 16px;
            order: -1;
            --origin-x: 100%;
        }

        .bubble.bot {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 4px 16px 16px 16px;
            --origin-x: 0%;
        }

        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: currentColor;
            margin-left: 4px;
            animation: blink 1s infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 40px 0;
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .divider.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider-text {
            padding: 0 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            white-space: nowrap;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.1; }
            50% { transform: translateY(-30px) translateX(15px); opacity: 0.2; }
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
        }

        .speed-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .speed-hint.visible {
            opacity: 1;
        }

        @media (max-width: 640px) {
            .bubble {
                max-width: 65vw;
                min-width: 200px;
                padding: 14px 18px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="speed-hint" id="speedHint">↑ 滑动加速中...</div>

    <div class="chat-wrapper">
        <div class="chat-container" id="chatContainer"></div>
    </div>

    <script>
        const chatData = [
            { type: 'user', content: 'What is Karot?' },
            { type: 'bot', content: 'Karot is a full process AI agent workflow platform.' },
            { type: 'user', content: 'How do I get started?' },
            { type: 'bot', content: 'We are at the alpha testing period, drop your wallet and Email in the waitlist, and follow to get updated.' },
            { type: 'divider', content: 'And more questions' },
            { type: 'user', content: 'Is it user-friendly enough?' }
        ];

        const container = document.getElementById('chatContainer');
        const speedHint = document.getElementById('speedHint');
        let currentIndex = 0;
        let typingSpeed = 40;
        let isSpeedUp = false;

        window.addEventListener('wheel', (e) => {
            const scrollVelocity = Math.abs(e.deltaY);
            if (scrollVelocity > 50) {
                typingSpeed = 5;
                isSpeedUp = true;
                speedHint.classList.add('visible');
                clearTimeout(window.speedTimeout);
                window.speedTimeout = setTimeout(() => {
                    typingSpeed = 40;
                    isSpeedUp = false;
                    speedHint.classList.remove('visible');
                }, 500);
            }
        }, { passive: true });

        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const deltaY = Math.abs(e.touches[0].clientY - touchStartY);
            if (deltaY > 30) {
                typingSpeed = 5;
                isSpeedUp = true;
                speedHint.classList.add('visible');
                clearTimeout(window.speedTimeout);
                window.speedTimeout = setTimeout(() => {
                    typingSpeed = 40;
                    isSpeedUp = false;
                    speedHint.classList.remove('visible');
                }, 500);
            }
        }, { passive: true });

        function createAvatar(type) {
            const avatar = document.createElement('div');
            avatar.className = `avatar ${type}`;
            return avatar;
        }

        function createBubble(type) {
            const bubble = document.createElement('div');
            bubble.className = `bubble ${type}`;
            return bubble;
        }

        function typeWriter(element, text, baseSpeed) {
            return new Promise(resolve => {
                let i = 0;
                const cursor = document.createElement('span');
                cursor.className = 'typing-cursor';
                element.appendChild(cursor);
                function type() {
                    const currentSpeed = isSpeedUp ? 5 : baseSpeed;
                    if (i < text.length) {
                        element.insertBefore(document.createTextNode(text.charAt(i)), cursor);
                        i++;
                        setTimeout(type, currentSpeed);
                    } else {
                        cursor.remove();
                        resolve();
                    }
                }
                type();
            });
        }

        async function showNextMessage() {
            if (currentIndex >= chatData.length) return;
            const data = chatData[currentIndex];
            currentIndex++;

            if (data.type === 'divider') {
                const divider = document.createElement('div');
                divider.className = 'divider';
                divider.innerHTML = `
                    <div class="divider-line"></div>
                    <div class="divider-text">${data.content}</div>
                    <div class="divider-line"></div>
                `;
                container.appendChild(divider);
                divider.offsetHeight;
                divider.classList.add('show');
                await new Promise(r => setTimeout(r, isSpeedUp ? 100 : 600));
                showNextMessage();
                return;
            }

            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${data.type}`;
            const avatar = createAvatar(data.type);
            const bubble = createBubble(data.type);
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            container.appendChild(wrapper);

            avatar.offsetHeight;
            avatar.classList.add('show');
            await new Promise(r => setTimeout(r, isSpeedUp ? 80 : 250));

            bubble.offsetHeight;
            bubble.classList.add('show');
            await new Promise(r => setTimeout(r, isSpeedUp ? 100 : 450));

            await typeWriter(bubble, data.content, 40);
            await new Promise(r => setTimeout(r, isSpeedUp ? 80 : 350));
            showNextMessage();
        }

        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 5 + 's';
                p.style.animationDuration = (5 + Math.random() * 5) + 's';
                const size = 4 + Math.random() * 6;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                particlesContainer.appendChild(p);
            }
        }

        createParticles();
        window.addEventListener('load', () => {
            setTimeout(showNextMessage, 600);
        });
    </script>
</body>
</html>
